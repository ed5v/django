{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | La Sirenita</title>
  <link rel="icon" href="{% static 'css/logo.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#040d20; --navy2:#0a1e42; --gold:#e0b344; --gold-soft:#f0d27e;
      --blue:#0077b6; --blue-dark:#023e8a;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:"Poppins",sans-serif; min-height:100vh;
      display:flex; align-items:center; justify-content:center; padding:1.5rem;
      background:
        radial-gradient(circle at 75% 15%, rgba(0,119,182,.35), transparent 55%),
        radial-gradient(circle at 20% 85%, rgba(224,179,68,.18), transparent 50%),
        linear-gradient(160deg, var(--navy) 0%, var(--navy2) 60%, #061330 100%);
      overflow:hidden; position:relative;
    }
    /* Burbujas decorativas */
    .bubble{
      position:absolute; bottom:-60px; border-radius:50%;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.4), rgba(0,119,182,.12));
      border:1px solid rgba(255,255,255,.15); animation:rise linear infinite; pointer-events:none;
    }
    @keyframes rise{
      0%{transform:translateY(0);opacity:0} 10%{opacity:1}
      100%{transform:translateY(-110vh) translateX(30px);opacity:0}
    }
    .card{
      position:relative; z-index:2; width:100%; max-width:410px;
      background:rgba(255,255,255,.97); border-radius:22px;
      box-shadow:0 25px 60px rgba(0,0,0,.45); padding:2.6rem 2.2rem 2.2rem;
      animation:appear .6s cubic-bezier(.22,1,.36,1);
    }
    @keyframes appear{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .logo-wrap{text-align:center; margin-bottom:1.2rem;}
    .logo-wrap img{
      width:96px; height:96px; object-fit:contain;
      background:linear-gradient(160deg,var(--navy),var(--navy2));
      border-radius:50%; padding:12px; box-shadow:0 8px 22px rgba(4,13,32,.35);
    }
    .brand{
      font-family:"Playfair Display",serif; text-align:center;
      font-size:1.7rem; font-weight:700; color:var(--navy); letter-spacing:.02em;
    }
    .subtitle{text-align:center; color:#7a8290; font-size:.85rem; margin-bottom:1.8rem; letter-spacing:.04em;}
    .field{margin-bottom:1.1rem;}
    .field label{display:block; font-size:.8rem; font-weight:600; color:var(--navy); margin-bottom:.4rem;}
    .input-wrap{position:relative;}
    .input-wrap svg{position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; opacity:.45;}
    .card input{
      width:100%; padding:.85rem 1rem .85rem 2.7rem; font-size:1rem; font-family:"Poppins";
      border:2px solid #e6e8ec; border-radius:12px; background:#fbfcfe; transition:all .25s ease;
    }
    .card input:focus{outline:none; border-color:var(--gold); background:#fff; box-shadow:0 0 0 4px rgba(224,179,68,.18);}
    .btn{
      width:100%; margin-top:.5rem; padding:.95rem; border:none; cursor:pointer;
      font-family:"Poppins"; font-size:1rem; font-weight:600; color:var(--navy);
      background:linear-gradient(135deg,var(--gold),#d4a43f); border-radius:50px;
      box-shadow:0 10px 24px rgba(224,179,68,.4); transition:transform .25s ease, box-shadow .25s ease;
      letter-spacing:.02em;
    }
    .btn:hover{transform:translateY(-2px); box-shadow:0 14px 30px rgba(224,179,68,.55);}
    .error-alert{
      background:#fff3f3; border:1px solid #efb6b6; border-left:5px solid #e23744;
      color:#8b1f1f; border-radius:10px; padding:.7rem .9rem; margin-bottom:1.2rem;
      font-size:.85rem; font-weight:500;
    }
    .foot{text-align:center; margin-top:1.6rem; font-size:.75rem; color:#9aa1ad;}
  </style>
</head>
<body>
  <!-- Burbujas -->
  <span class="bubble" style="left:10%;width:26px;height:26px;animation-duration:14s;"></span>
  <span class="bubble" style="left:25%;width:14px;height:14px;animation-duration:11s;animation-delay:2s;"></span>
  <span class="bubble" style="left:55%;width:34px;height:34px;animation-duration:18s;animation-delay:1s;"></span>
  <span class="bubble" style="left:72%;width:18px;height:18px;animation-duration:13s;animation-delay:4s;"></span>
  <span class="bubble" style="left:88%;width:22px;height:22px;animation-duration:16s;animation-delay:3s;"></span>

  <div class="card">
    <div class="logo-wrap">
      <img src="{% static 'css/logo.png' %}" alt="La Sirenita">
    </div>
    <h1 class="brand">La Sirenita</h1>
    <p class="subtitle">SISTEMA DE PUNTO DE VENTA</p>

    {% if form.errors %}
    <div class="error-alert">
      Usuario o contraseña incorrectos. Inténtalo de nuevo.
    </div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

      <div class="field">
        <label for="id_username">Usuario</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
          {{ form.username }}
        </div>
      </div>

      <div class="field">
        <label for="id_password">Contraseña</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          {{ form.password }}
        </div>
      </div>

      <button type="submit" class="btn">Entrar</button>
    </form>

    <p class="foot">El sabor del mar, hecho tradición</p>
  </div>
</body>
</html>
